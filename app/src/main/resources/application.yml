# Configuración base del backend Montaña Margarita.
# Las variables de entorno se inyectan desde Docker o .env.

spring:
  application:
    name: montania-margarita-backend
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/montania}
      auto-index-creation: true
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

# Configuración de la app
app:
  jwt:
    secret: ${JWT_SECRET:secreto_local_inseguro_solo_para_desarrollo_cambiar_xxxxxxxx}
    expiracion-segundos: 28800   # 8 horas (jornada laboral)
    issuer: montania-margarita

# Documentación interactiva
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    persist-authorization: true

# Logs
logging:
  level:
    root: INFO
    com.montaniamargarita: DEBUG

# Actuator (healthcheck)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
