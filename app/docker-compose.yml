version: "3.9"

# Despliegue del backend + MongoDB para el restaurante Montaña Margarita.
# Política restart: unless-stopped garantiza recuperación tras cortes de energía.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: montania-margarita-app:1.0.0
    container_name: montania-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/montania?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      TZ: America/Bogota
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - montania-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo:
    image: mongo:7
    container_name: montania-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      TZ: America/Bogota
    volumes:
      - ./data:/data/db
    networks:
      - montania-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  montania-network:
    driver: bridge
